##
## docker-compose.yml — Full-stack local development environment
##
## Services:
##   postgres        — Local PostgreSQL (production uses RDS)
##   redis           — Credit cache + CDR staging store
##   freeswitch      — SIP engine with Lua dialplan (host networking for RTP)
##   api             — FastAPI backend (replaces PHP Sentinel)
##   billing-worker  — ESL event consumer (replaces checkServiceType.pl)
##
## Monitoring (optional — add --profile monitoring):
##   prometheus      — Metrics scraping
##   grafana         — Dashboards
##
## Usage:
##   cp .env.example .env          # fill in secrets
##   make dev                      # build + start all services
##   make dev-monitor              # start with prometheus + grafana
##   make test                     # run pytest suite inside container
##
## FreeSWITCH networking:
##   Uses network_mode: host on Linux — REQUIRED for RTP NAT traversal in local dev.
##   This means Lua scripts reach FastAPI at http://127.0.0.1:8000 (host loopback).
##   Billing worker reaches FreeSWITCH ESL at host.docker.internal:8021.
##   NOTE: network_mode: host is Linux-only. On macOS/Windows, use
##         docker-compose.host-net.yml which documents the workaround.

name: voip-platform

services:

  # ── PostgreSQL — local dev only (production uses RDS) ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: voip-postgres
    environment:
      POSTGRES_DB:       "${POSTGRES_DB:-galaxy_2}"
      POSTGRES_USER:     "${POSTGRES_USER:-dev_ifx}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-dev_password_local}"
    # Host port commented out to avoid conflicts with a running local PostgreSQL.
    # To access from the host (e.g., pgAdmin), uncomment and use a free port:
    # ports:
    #   - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev_ifx} -d ${POSTGRES_DB:-galaxy_2}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis — credit cache + CDR staging ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voip-redis
    command: redis-server --appendonly yes
    # Host port commented out to avoid conflicts with a running local Redis.
    # To access from the host (e.g., redis-cli), uncomment and use a free port:
    # ports:
    #   - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FreeSWITCH SIP engine ───────────────────────────────────────────────────
  # network_mode: host is required for RTP media on Linux (NAT traversal).
  # FreeSWITCH binds SIP (5060), ESL (8021), and RTP (16384-32768) directly
  # on the host network interface — not through Docker port mapping.
  freeswitch:
    build:
      context: ./freeswitch
      dockerfile: Dockerfile
    container_name: voip-freeswitch
    network_mode: host
    restart: unless-stopped
    environment:
      # API on host loopback — FS is on host network, API exposed at :8000
      VOIP_API_BASE_URL:       "http://127.0.0.1:8000"
      VOIP_INTERNAL_TOKEN:     "${VOIP_INTERNAL_TOKEN:-}"
      VOXBONE_USERNAME:        "${VOXBONE_USERNAME:-}"
      VOXBONE_PASSWORD:        "${VOXBONE_PASSWORD:-}"
      VOXBONE_REALM:           "${VOXBONE_REALM:-sip.voxbone.com}"
      VOXBONE_PROXY:           "${VOXBONE_PROXY:-sip.voxbone.com}"
      FS_ESL_PASSWORD:         "${FS_ESL_PASSWORD:-ClueCon}"
      VOIP_HTTP_TIMEOUT_MS:    "${VOIP_HTTP_TIMEOUT_MS:-2000}"
      VOIP_TICK_TIMEOUT_MS:    "${VOIP_TICK_TIMEOUT_MS:-1500}"
      VOIP_WARN_REMAINING_SEC: "${VOIP_WARN_REMAINING_SEC:-320}"
      VOIP_BEEP_REMAINING_SEC: "${VOIP_BEEP_REMAINING_SEC:-10}"
      VOIP_AUTH_ATTEMPTS:      "${VOIP_AUTH_ATTEMPTS:-3}"
      VOIP_PIN_LENGTH:         "${VOIP_PIN_LENGTH:-8}"
      VOIP_DTMF_TIMEOUT_MS:    "${VOIP_DTMF_TIMEOUT_MS:-5000}"
      VOIP_DEFAULT_GATEWAY:    "${VOIP_DEFAULT_GATEWAY:-voxbone-outbound}"
      INTERNAL_TOKEN:          "${VOIP_INTERNAL_TOKEN:-}"
    volumes:
      # Hot reload Lua scripts in dev — change script, reload mod_lua (no restart)
      - ./freeswitch/lua:/usr/share/freeswitch/scripts/lua
      # Hot reload FS config in dev — change conf, run fs_cli -x "reloadxml"
      - ./freeswitch/conf:/etc/freeswitch
    depends_on:
      api:
        condition: service_healthy

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voip-api
    ports:
      # Port 8000 is occupied by Portainer on this host; map to 8080 instead.
      # To revert to 8000: change to "8000:8000" and kill the conflicting service.
      - "${API_HOST_PORT:-8080}:8000"
    environment:
      # postgres/redis are on the same compose bridge network — use service names
      DATABASE_URL:        "postgresql+asyncpg://${POSTGRES_USER:-dev_ifx}:${POSTGRES_PASSWORD:-dev_password_local}@postgres:5432/${POSTGRES_DB:-galaxy_2}"
      REDIS_URL:           "redis://redis:6379"
      INTERNAL_JWT_SECRET: "${INTERNAL_JWT_SECRET:-changeme-min-32-chars-for-local-dev}"
      ENVIRONMENT:         "development"
      DEBUG:               "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload — uvicorn --reload watches ./backend/app/
      - ./backend/app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3

  # ── Billing Worker ──────────────────────────────────────────────────────────
  billing-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: voip-billing-worker
    restart: unless-stopped
    environment:
      # postgres/redis on same bridge network — use service names
      DATABASE_URL:            "postgresql+asyncpg://${POSTGRES_USER:-dev_ifx}:${POSTGRES_PASSWORD:-dev_password_local}@postgres:5432/${POSTGRES_DB:-galaxy_2}"
      REDIS_URL:               "redis://redis:6379"
      # FreeSWITCH uses host network — reach ESL via host.docker.internal
      FREESWITCH_ESL_HOST:     "host.docker.internal"
      FREESWITCH_ESL_PORT:     "8021"
      FREESWITCH_ESL_PASSWORD: "${FS_ESL_PASSWORD:-ClueCon}"
      INTERNAL_JWT_SECRET:     "${INTERNAL_JWT_SECRET:-changeme-min-32-chars-for-local-dev}"
    # host.docker.internal resolves to Docker host — needed to reach FS ESL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Prometheus — optional monitoring ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: voip-prometheus
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ── Grafana — optional dashboards ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: voip-grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP:     "false"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: voip_postgres_data
  redis_data:
    name: voip_redis_data
  grafana_data:
    name: voip_grafana_data
