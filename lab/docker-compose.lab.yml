# lab/docker-compose.lab.yml — Local VoIP Test Lab
# Full stack for end-to-end testing without a real Voxbone SIP trunk.
#
# Asterisk = fake carrier (simulates Voxbone DID delivery)
# FreeSWITCH = host network (required for RTP with physical Fanvil phones)
# FastAPI + Billing Worker + PostgreSQL + Redis = same as production stack
#
# PORT MAPPING (avoids conflicts with any existing dev containers):
#   Lab FastAPI  → host:8001   (portainer may occupy 8000)
#   Lab Postgres → host:5433   (other postgres may occupy 5432)
#   Lab Redis    → host:6380   (other redis may occupy 6379)
#   Asterisk SIP → host:5080   (UDP+TCP, maps to container:5060)
#
# Container names use the "voip-lab-" prefix to avoid clashing with
# any existing "voip-*" containers from other compose stacks.
#
# Quick start:
#   cp .env.lab.example .env.lab && edit it
#   bash scripts/setup-lab.sh
#
# Fanvil phone settings: SIP Server = <your-machine-IP>, port 5060
#                        Transport: UDP  (TCP also enabled on internal profile)
#                        Register expiry: 60s
#                        Codec: PCMA (G.711a) first

version: "3.9"

networks:
  voip-lab:
    name: voip-lab
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

services:

  # ─────────────────────────────────────────────────────────────────
  # ASTERISK — Fake Voxbone carrier + outbound consultant routing
  # ─────────────────────────────────────────────────────────────────
  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: voip-lab-asterisk
    networks:
      voip-lab:
        ipv4_address: 172.28.0.50
    ports:
      # Expose Asterisk SIP on host:5090 for diagnostics only.
      # FreeSWITCH (host network) reaches Asterisk via Docker network: 172.28.0.50:5060
      # Asterisk reaches FreeSWITCH external profile via host.docker.internal:5080
      - "5090:5060/udp"
      - "5090:5060/tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Resolves to host machine IP (Docker Engine 20.10+)
    volumes:
      - ./asterisk/conf:/etc/asterisk:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "sip show peers"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────
  # FREESWITCH — Host network (REQUIRED for RTP with LAN IP phones)
  # Runs on the host network stack:
  #   - Internal SIP profile: port 5060 (phones register here)
  #   - External SIP profile: port 5080 (carrier trunk / Asterisk)
  #   - ESL: port 8021
  #
  # IMPORTANT: network_mode: host means NO extra_hosts or networks here.
  # FS reaches the host's Docker bridge containers by their bridge IPs directly.
  # ─────────────────────────────────────────────────────────────────
  freeswitch:
    build:
      context: ..    # repo root — required so Dockerfile can COPY freeswitch/docker-entrypoint.sh
      dockerfile: lab/freeswitch-lab/Dockerfile
      # SignalWire token is injected as a build secret — never stored in image layers
      secrets:
        - signalwire_token
    container_name: voip-lab-freeswitch
    network_mode: host
    environment:
      # Entrypoint variable names (see freeswitch/docker-entrypoint.sh)
      - VOIP_API_BASE_URL=http://127.0.0.1:8001    # FastAPI mapped to host:8001
      - VOIP_INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - FS_ESL_PASSWORD=${FS_ESL_PASSWORD:-ClueCon}
      - VOIP_DEFAULT_GATEWAY=asterisk-lab
      # Codec: PCMA first for Fanvil phones (overrides template default PCMU,PCMA)
      - VOIP_GLOBAL_CODEC_PREFS=PCMA,PCMU,G729,OPUS
      - VOIP_OUTBOUND_CODEC_PREFS=PCMA,PCMU
      # Leave Voxbone vars blank — not needed in lab
      - VOXBONE_USERNAME=lab
      - VOXBONE_PASSWORD=lab
      - VOXBONE_REALM=172.28.0.50
      - VOXBONE_PROXY=172.28.0.50
      - RTP_START_PORT=16384
      - RTP_END_PORT=32768
    volumes:
      # Lua scripts — hot reload from host filesystem
      - ../freeswitch/lua:/usr/share/freeswitch/scripts
      # Full lab config directory — includes freeswitch.xml, autoload_configs/, dialplan/,
      # directory/, sip_profiles/, vars.xml.tpl.
      # The entrypoint writes vars.xml and event_socket.conf.xml into this mount at runtime.
      - ./freeswitch-lab/conf:/etc/freeswitch
      - freeswitch-logs:/var/log/freeswitch
    restart: unless-stopped
    depends_on:
      - asterisk

  # ─────────────────────────────────────────────────────────────────
  # FASTAPI — Auth + billing API
  # host:8001 → avoids conflict with portainer on 8000
  # ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: voip-lab-api
    networks:
      voip-lab:
        ipv4_address: 172.28.0.20
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://dev_ifx:labpass@172.28.0.30:5432/galaxy_2
      - REDIS_URL=redis://172.28.0.40:6379
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - ENVIRONMENT=lab
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../backend/app:/app/app    # hot reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # BILLING WORKER — ESL event consumer + CDR writer
  # Connects to FreeSWITCH ESL via host.docker.internal (FS on host net)
  # ─────────────────────────────────────────────────────────────────
  billing-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    container_name: voip-lab-billing-worker
    networks:
      voip-lab:
        ipv4_address: 172.28.0.25
    extra_hosts:
      - "host.docker.internal:host-gateway"   # FreeSWITCH ESL reachable at host IP
    environment:
      - DATABASE_URL=postgresql+asyncpg://dev_ifx:labpass@172.28.0.30:5432/galaxy_2
      - REDIS_URL=redis://172.28.0.40:6379
      - FREESWITCH_ESL_HOST=host.docker.internal   # FS on host network
      - FREESWITCH_ESL_PORT=8021
      - FREESWITCH_ESL_PASSWORD=${FS_ESL_PASSWORD:-ClueCon}
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # POSTGRESQL — host:5433 to avoid conflict with any existing postgres:5432
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: voip-lab-postgres
    networks:
      voip-lab:
        ipv4_address: 172.28.0.30
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=galaxy_2
      - POSTGRES_USER=dev_ifx
      - POSTGRES_PASSWORD=labpass
    volumes:
      - postgres-lab-data:/var/lib/postgresql/data
      # init.sql creates the base schema on first start (empty data volume).
      # Runs before setup-lab.sh, so tables exist when Alembic + seed run.
      - ../../scripts/db/init.sql:/docker-entrypoint-initdb.d/00-init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_ifx -d galaxy_2"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────────────
  # REDIS — host:6380 to avoid conflict with any existing redis:6379
  # ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voip-lab-redis
    networks:
      voip-lab:
        ipv4_address: 172.28.0.40
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --loglevel verbose
    volumes:
      - redis-lab-data:/data
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # SIPP — Load testing (only with --profile loadtest)
  # ─────────────────────────────────────────────────────────────────
  sipp:
    image: ctaloi/sipp:latest
    container_name: voip-lab-sipp
    networks:
      voip-lab:
        ipv4_address: 172.28.0.60
    volumes:
      - ./sipp/scenarios:/scenarios
    profiles: ["loadtest"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────────────────────────
  # PROMETHEUS (optional — --profile monitoring)
  # ─────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: voip-lab-prometheus
    networks:
      voip-lab:
        ipv4_address: 172.28.0.71
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles: ["monitoring"]

  # ─────────────────────────────────────────────────────────────────
  # GRAFANA (optional — --profile monitoring)
  # ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: voip-lab-grafana
    networks:
      voip-lab:
        ipv4_address: 172.28.0.70
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana-lab-data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    profiles: ["monitoring"]

volumes:
  postgres-lab-data:
  redis-lab-data:
  freeswitch-logs:
  grafana-lab-data:

secrets:
  signalwire_token:
    environment: SIGNALWIRE_TOKEN
