; lab/asterisk/conf/asterisk.conf — Minimal Asterisk master config
; Redirects all logging to stdout for Docker compatibility.

[directories]
astetcdir => /etc/asterisk
; Ubuntu 22.04 package installs modules here (arch-specific path)
astmoddir => /usr/lib/x86_64-linux-gnu/asterisk/modules
astvarlibdir => /var/lib/asterisk
astdbdir => /var/lib/asterisk
astkeydir => /var/lib/asterisk
; IMPORTANT: astdatadir must point to /usr/share/asterisk on Ubuntu 22.04.
; The XML documentation (core-en_US.xml) lives at
; /usr/share/asterisk/documentation/ — if astdatadir is wrong, Stasis
; can't find its doc types and crashes with "Stasis initialization failed".
astdatadir => /usr/share/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk

[options]
verbose = 5
debug = 3
documentation_language = en_US
; Do not daemonize — run in foreground for Docker
nofork = yes
quiet = no
