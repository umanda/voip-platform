; lab/asterisk/conf/logger.conf — Asterisk logging to stdout (Docker-friendly)

[logfiles]
; Write all output to stdout — Docker captures this via docker logs
console => warning,notice,verbose,error,dtmf
; Also keep a file for post-mortem debugging
/var/log/asterisk/full => warning,notice,verbose,error,debug,dtmf,fax

[general]
appendhostname = no
rotatestrategy = rotate
