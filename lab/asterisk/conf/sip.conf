; lab/asterisk/conf/sip.conf — Asterisk chan_sip configuration
;
; Lab role: Asterisk simulates two things:
;   1. Fake Voxbone DID carrier — accepts calls and routes to FreeSWITCH external
;   2. Outbound gateway — receives calls from FreeSWITCH and routes to extensions on FS
;
; Call flow:
;   a) INBOUND (carrier simulation):
;      SIPp/softphone → Asterisk:5060 [from-lab-caller] → FS external :5080
;
;   b) OUTBOUND (consultant routing):
;      FS bridge → Asterisk:5060 [from-freeswitch] → FS internal ext 1002 :5060
;
; host.docker.internal resolves to the host machine IP via Docker's host-gateway
; extra_hosts setting in docker-compose.lab.yml.
; FreeSWITCH is on host network, so both FS profiles are on host.docker.internal.

[general]
context=default-reject        ; Reject any call that doesn't match a named peer
bindport=5060
bindaddr=0.0.0.0
srvlookup=no
; Fanvil phones use alaw first — match that preference
disallow=all
allow=alaw                    ; PCMA (G.711 a-law) — Fanvil first preference
allow=ulaw                    ; PCMU (G.711 u-law) — fallback

nat=force_rport,comedia       ; Essential for calls from behind NAT
qualify=yes
qualifyfreq=30
videosupport=no
; Register expiry aligned with Fanvil setting
defaultexpiry=60
minexpiry=60
maxexpiry=60

; Improve reliability — match FS tolerances
timerb=8000
t1min=200

; ─────────────────────────────────────────────────────────────────
; FreeSWITCH peer — OUTBOUND to FS external profile
; Used when Asterisk needs to deliver DID calls to FS for auth.
; host.docker.internal = host machine running FreeSWITCH
; Port 5080 = FreeSWITCH external SIP profile
; ─────────────────────────────────────────────────────────────────
[freeswitch-external]
type=peer
host=host.docker.internal
port=5080
insecure=port,invite          ; FS does not require Asterisk to register
context=from-lab-caller       ; Asterisk context to route DID calls to FS
disallow=all
allow=alaw
allow=ulaw
dtmfmode=rfc2833
nat=force_rport,comedia
qualify=yes
qualifyfreq=30

; ─────────────────────────────────────────────────────────────────
; FreeSWITCH internal peer — Outbound consultant routing
; When FS bridges a call to the asterisk-lab gateway, it arrives here.
; We route it back to FS internal (port 5060) to ring the extension.
; This peer is also used for inbound calls from FS to Asterisk.
; ─────────────────────────────────────────────────────────────────
[freeswitch-internal]
type=peer
host=host.docker.internal
port=5060
insecure=port,invite
context=from-freeswitch       ; Context for outbound consultant calls from FS
disallow=all
allow=alaw
allow=ulaw
dtmfmode=rfc2833
nat=force_rport,comedia
qualify=yes
qualifyfreq=30

; ─────────────────────────────────────────────────────────────────
; SIPp peer — Load test tool connects from 172.20.0.60
; ─────────────────────────────────────────────────────────────────
[sipp]
type=friend
host=dynamic
context=from-lab-caller
insecure=port,invite
disallow=all
allow=alaw
allow=ulaw
dtmfmode=rfc2833
nat=force_rport,comedia
