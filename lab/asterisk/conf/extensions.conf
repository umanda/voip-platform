; lab/asterisk/conf/extensions.conf — Asterisk dialplan for VoIP lab
;
; ─────────────────────────────────────────────────────────────────
; Context map:
;
;   [from-lab-caller]  — SIPp or softphones dialing test DIDs
;                        Asterisk routes to FreeSWITCH external (DID delivery)
;
;   [from-freeswitch]  — Calls from FreeSWITCH (outbound consultant bridge)
;                        Routes back to FreeSWITCH internal to ring extensions
;
;   [default-reject]   — Catch-all: reject unknown calls with 403
;
; Test DIDs (fake Voxbone numbers):
;   +18001000001  → Account Alpha  (1000 EUR credit)
;   +18001000002  → Account Beta   (1.20 EUR credit — ~2 min)
;   +18001000003  → Account Zero   (0.00 credit — rejected by FastAPI)
;   +18001000004  → Account Blocked (is_blocked=true — rejected by FastAPI)
;
; Lab consultant phone: 1002  (rings Fanvil Phone 2 registered on FS)
; ─────────────────────────────────────────────────────────────────

[globals]
; host.docker.internal resolves to host machine (FreeSWITCH host-net)
; These are expanded at load time via Asterisk's env() function.
; Override in .env.lab if your FS is on a different port.
FS_EXT_PORT=5080    ; FreeSWITCH external SIP profile
FS_INT_PORT=5060    ; FreeSWITCH internal SIP profile (extensions register here)

; ─────────────────────────────────────────────────────────────────
; [from-lab-caller] — receives calls from SIPp and test softphones.
; These simulate a PSTN caller dialing a Voxbone DID.
; Routes to FreeSWITCH external profile for auth + billing.
; ─────────────────────────────────────────────────────────────────
[from-lab-caller]

; Test DID 1 — Good credit account (Alpha, PIN: 12341001)
exten => +18001000001,1,NoOp(Lab DID 1 → FS for auth/billing)
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(SIP/freeswitch-external/+18001000001,60)
 same => n,Hangup()

; Test DID 2 — Low credit account (Beta, PIN: 12341002 — ~2min at EUR 0.02/min)
exten => +18001000002,1,NoOp(Lab DID 2 → FS — low credit test)
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(SIP/freeswitch-external/+18001000002,300)
 same => n,Hangup()

; Test DID 3 — Zero credit (PIN: 12341003 — FastAPI will reject)
exten => +18001000003,1,NoOp(Lab DID 3 → FS — zero credit test)
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(SIP/freeswitch-external/+18001000003,30)
 same => n,Hangup()

; Test DID 4 — Blocked account (PIN: 12341004 — FastAPI will reject)
exten => +18001000004,1,NoOp(Lab DID 4 → FS — blocked account test)
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(SIP/freeswitch-external/+18001000004,30)
 same => n,Hangup()

; SIPp sends calls with E.164 format — match +1800XXXXXXX pattern
exten => _+18001XXXXXX,1,NoOp(SIPp lab DID ${EXTEN} → FS)
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(SIP/freeswitch-external/${EXTEN},60)
 same => n,Hangup()

; Reject anything else with 403
exten => _.,1,NoOp(Unknown DID ${EXTEN} — rejecting)
 same => n,Congestion()
 same => n,Hangup(21)

; ─────────────────────────────────────────────────────────────────
; [from-freeswitch] — receives outbound calls from FreeSWITCH
; (the consultant bridge leg: FS → asterisk-lab gateway → here)
;
; FreeSWITCH bridges to:
;   sofia/gateway/asterisk-lab/<consultant_phone_number>
;
; Consultant phone number in seed data: 1002
; Asterisk routes extension 1002 back to FreeSWITCH internal (:5060)
; FreeSWITCH internal profile rings the registered Fanvil Phone 2 (ext 1002)
;
; host.docker.internal resolves to the host machine (FreeSWITCH host-net)
; ─────────────────────────────────────────────────────────────────
[from-freeswitch]

; Route 4-digit extensions (lab phones registered on FS) back to FS internal
exten => _1XXX,1,NoOp(Routing ext ${EXTEN} via FS internal)
 same => n,Dial(SIP/${EXTEN}@host.docker.internal:5060,30)
 same => n,Hangup()

; Route 5+ digit numbers as PSTN via FS external
exten => _X.,1,NoOp(Routing ${EXTEN} via FS external)
 same => n,Dial(SIP/freeswitch-external/${EXTEN},60)
 same => n,Hangup()

; ─────────────────────────────────────────────────────────────────
; [default-reject] — Catch-all for unconfigured traffic
; ─────────────────────────────────────────────────────────────────
[default-reject]
exten => _.,1,NoOp(Rejected: ${EXTEN} from ${CHANNEL})
 same => n,Hangup(21)
