; lab/asterisk/conf/modules.conf -- Load only what the lab needs.
; Keeping this minimal prevents errors from missing optional modules.
;
; IMPORTANT: The core Stasis bus (stasis_init in main/asterisk.c) requires
; astdatadir => /usr/share/asterisk in asterisk.conf so it can find
; /usr/share/asterisk/documentation/core-en_US.xml at startup.
; Without this, "Stasis initialization failed" crash.
;
; res_ari is omitted -- it requires res_http_server which conflicts in
; the Ubuntu 22.04 package build.
; res_rtp_asterisk is omitted -- has missing PJSIP symbol in Ubuntu package.

[modules]
autoload = no

; Stasis (REQUIRED -- Asterisk internal message bus)
load => res_stasis.so
load => res_stasis_answer.so
load => res_stasis_playback.so
load => res_stasis_recording.so
load => res_stasis_snoop.so
load => res_stasis_device_state.so
load => res_stasis_dialplan.so
load => res_stasis_bridge_softmix.so

; Core / Bridges
load => bridge_simple.so
load => bridge_builtin_features.so
load => bridge_builtin_interval_features.so
load => bridge_holding.so

; Core PBX functionality
load => pbx_config.so
load => res_musiconhold.so
load => res_adsi.so
load => res_agi.so

; chan_sip -- the SIP channel driver (not PJSIP, simpler for lab)
load => chan_sip.so

; Audio codecs
load => codec_ulaw.so
load => codec_alaw.so
load => format_pcm.so
load => format_wav.so
load => format_gsm.so

; Dialplan applications
load => app_dial.so
load => app_hangup.so
load => app_noop.so
load => app_verbose.so
load => app_playback.so
load => app_record.so
