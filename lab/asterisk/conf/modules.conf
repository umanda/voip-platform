; lab/asterisk/conf/modules.conf — Load only what the lab needs.
; Keeping this minimal prevents errors from missing optional modules.

[modules]
autoload = no

; Core PBX functionality
load => res_musiconhold.so
load => res_adsi.so
load => res_agi.so

; chan_sip — the SIP channel driver (not PJSIP, simpler for lab)
load => chan_sip.so

; Audio codecs
load => codec_ulaw.so        ; PCMU (G.711 u-law)
load => codec_alaw.so        ; PCMA (G.711 a-law) — Fanvil preference
load => format_pcm.so

; Dialplan applications
load => app_dial.so
load => app_hangup.so
load => app_noop.so
load => app_setvar.so
load => app_verbose.so
load => app_answer.so
load => app_playback.so
load => app_record.so
load => app_ringing.so

; DTMF
load => res_rtp_asterisk.so
