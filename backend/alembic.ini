# alembic.ini — Alembic configuration for galaxy_2 async migrations
# Do NOT commit DB credentials here. Use DATABASE_URL env var (see alembic/env.py).
#
# Usage:
#   alembic upgrade head           # apply all pending migrations
#   alembic revision --autogenerate -m "add_xyz"  # generate new migration
#   alembic history                # show migration history
#   alembic current                # show current DB revision
#
# IMPORTANT: Review autogenerated migrations before applying.
# See alembic/env.py for detailed safety notes.

[alembic]
# Database URL is read dynamically from DATABASE_URL env var in env.py.
# This placeholder is here to satisfy alembic's config parser.
script_location = alembic

# Output encoding for revision files
output_encoding = utf-8

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
